version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: carefirst_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Nếu có GPU NVIDIA, bỏ comment 3 dòng sau:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ai-service:
    build: ./ai-service
    container_name: carefirst_ai
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - CSHARP_API_URL=http://host.docker.internal:5293
      - MODEL_NAME=qwen2.5:7b
    volumes:
      - ./ai-service/data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: