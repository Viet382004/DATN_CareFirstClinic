<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareFirst - Đồng hành cùng sức khỏe của bạn</title>
    <style>
      /* Pre-loader and initial background to prevent flicker */
      body {
        margin: 0;
        background-color: #ffffff;
      }
      #root {
        min-height: 100vh;
      }
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: white;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-dot {
        width: 12px;
        height: 12px;
        background-color: #0d9488; /* teal-600 */
        border-radius: 50%;
        margin: 0 5px;
        animation: loader-pulse 1.5s infinite ease-in-out;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-pulse {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen" class="initial-loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loader once app is loaded
      window.addEventListener('load', () => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 500);
        }
      });
    </script>
  </body>
</html>
